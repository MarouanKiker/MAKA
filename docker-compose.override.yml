version: '3.8'

services:
  auth-service:
    build:
      context: ./services/auth-service
      target: dev
    volumes:
      - ./services/auth-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"

  crm-service:
    volumes:
      - ./services/crm-service:/app
    environment:
      ASPNETCORE_ENVIRONMENT: Development

  stock-service:
    volumes:
      - ./services/stock-service:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_DEBUG: "true"

  sales-service:
    volumes:
      - ./services/sales-service:/app
    environment:
      DEBUG: "true"
      RELOAD: "true"

  hr-service:
    volumes:
      - ./services/hr-service:/app
    environment:
      SPRING_PROFILES_ACTIVE: dev

  finance-service:
    volumes:
      - ./services/finance-service:/app
    environment:
      SPRING_PROFILES_ACTIVE: dev

  frontend:
    volumes:
      - ./services/frontend:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
