<div class="auth-page">
    <!-- fond anime -->
    <div class="auth-bg">
        <div class="bg-shape s1"></div>
        <div class="bg-shape s2"></div>
        <div class="bg-shape s3"></div>
    </div>

    <!-- carte centree -->
    <div class="auth-card">

        <button class="theme-toggle" (click)="toggleTheme()">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16">
                <circle cx="10" cy="10" r="4" *ngIf="themeSvc.isDark()" />
                <path
                    d="M10 2v2m0 12v2m8-8h-2M4 10H2m13.1-5.1l-1.4 1.4M7.3 12.7l-1.4 1.4m9.2 0l-1.4-1.4M7.3 7.3L5.9 5.9"
                    *ngIf="themeSvc.isDark()" />
                <path d="M14 10a4 4 0 11-8 0 8 8 0 008 0z" *ngIf="!themeSvc.isDark()" />
            </svg>
        </button>

        <div class="card-brand">
            <img src="assets/logo.jpeg" alt="MAKA" class="card-logo" />
            <span class="card-brand-text">MAKA <span>ERP</span></span>
        </div>

        <h2>Connexion</h2>
        <p class="card-sub">Accedez a votre espace CRM</p>

        <div class="alert alert-error" *ngIf="erreur">{{ erreur }}</div>

        <form (ngSubmit)="onLogin()">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" [(ngModel)]="email" name="email" placeholder="votre@email.com"
                    required />
            </div>
            <div class="form-group">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                    required />
            </div>
            <button type="submit" class="btn-primary" [disabled]="loading">
                {{ loading ? 'Connexion...' : 'Se connecter' }}
            </button>
        </form>

        <p class="card-footer">Pas de compte ? <a routerLink="/register">Creer un compte</a></p>

    </div>
</div>
