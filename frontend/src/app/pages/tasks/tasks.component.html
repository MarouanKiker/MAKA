<div>
    <div class="page-header">
        <div>
            <h1>
                <i class="fa-solid fa-check-square page-icon"></i>
                Gestion des tâches
            </h1>
            <p class="page-subtitle">Glissez les cartes pour marquer les tâches comme terminées</p>
        </div>
        <div style="display:flex; align-items:center; gap:.75rem;">
            <span class="total-badge">{{ tasks.length }} tâches</span>
            <button class="btn-add" (click)="openForm()">+ Nouvelle tâche</button>
        </div>
    </div>

    <div class="toast" *ngIf="message" (click)="message = ''">{{ message }}</div>

    <!-- kanban drag & drop -->
    <div class="kanban">
        <div class="kanban-col" *ngFor="let col of columns" (dragover)="onDragOver($event)"
            (drop)="onDrop($event, col.key)">

            <div class="kanban-col-header">
                <span class="kanban-dot" [style.background]="col.color"></span>
                <span class="kanban-col-title">{{ col.label }}</span>
                <span class="kanban-count">{{ getByCompleted(col.key).length }}</span>
            </div>

            <div class="kanban-cards" [class.drag-over]="draggedTask">
                <div class="kanban-card" *ngFor="let t of getByCompleted(col.key)" draggable="true"
                    (dragstart)="onDragStart(t)" (dragend)="onDragEnd()" [class.dragging]="draggedTask === t"
                    [class.task-done]="t.isCompleted">

                    <div class="card-top">
                        <span class="card-title">{{ t.title }}</span>
                        <input type="checkbox" [checked]="t.isCompleted" (change)="toggleComplete(t)"
                            title="Marquer comme terminé" />
                    </div>

                    <p class="card-desc">{{ t.description }}</p>

                    <div class="card-meta">
                        <span class="card-meta-item meta-date">
                            <i class="fa-regular fa-calendar meta-icon"></i>
                            Échéance : {{ t.dueDate | date:'dd/MM/yyyy' }}
                        </span>
                    </div>

                    <div class="card-bottom">
                        <button class="btn-del" (click)="delete(t.id)" title="Supprimer">×</button>
                    </div>
                </div>

                <div class="kanban-empty" *ngIf="getByCompleted(col.key).length === 0">
                    Déposez une tâche ici
                </div>
            </div>
        </div>
    </div>

    <!-- modal ajouter -->
    <div class="modal-overlay" *ngIf="showForm" (click)="showForm = false">
        <div class="modal" (click)="$event.stopPropagation()">
            <h2>Nouvelle tâche</h2>
            <div class="champ">
                <label>Titre *</label>
                <input type="text" [(ngModel)]="title" placeholder="Titre de la tâche" />
            </div>
            <div class="champ">
                <label>Description</label>
                <textarea [(ngModel)]="description" placeholder="Détails..."></textarea>
            </div>
            <div class="champ">
                <label>Échéance *</label>
                <input type="date" [(ngModel)]="dueDate" />
            </div>
            <div class="modal-actions">
                <button class="btn-cancel" (click)="showForm = false">Annuler</button>
                <button class="btn-save" (click)="save()">Enregistrer</button>
            </div>
        </div>
    </div>
</div>
