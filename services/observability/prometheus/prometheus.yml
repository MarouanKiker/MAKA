global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: finance-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - finance-service:6000

  - job_name: stock-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - stock-service:8083

  - job_name: hr-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - hr-service:8080
