server.port=8080

# Identificateurs d'application
spring.application.name=hr-service

# Configuration PostgreSQL (Liée au réseau Docker 'hr-db')
spring.datasource.url=jdbc:postgresql://hr-db:5432/${HR_DB_NAME:hr_db}
spring.datasource.username=${HR_DB_USER:hr_user}
spring.datasource.password=${HR_DB_PASSWORD:hr_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA & Hibernate (Code-First : Met à jour la base automatiquement)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=hr-service

