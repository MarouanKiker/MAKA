spring.application.name=finance-service
server.port=${SERVER_PORT:6000}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5435/finance_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate gère le schéma automatiquement
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway désactivé — Hibernate crée le schéma
spring.flyway.enabled=false

spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:maka}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:maka_secret}

# Cache simple par défaut (Redis optionnel)
spring.cache.type=${SPRING_CACHE_TYPE:simple}

# JWT validé via la clé publique RSA montée dans /app/keys/public.pem
# (même approche que le CRM service .NET)

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.service=finance-service

resilience4j.retry.instances.rabbitPublisher.max-attempts=3
resilience4j.retry.instances.rabbitPublisher.wait-duration=500ms
resilience4j.circuitbreaker.instances.rabbitPublisher.sliding-window-size=10
resilience4j.circuitbreaker.instances.rabbitPublisher.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.rabbitPublisher.wait-duration-in-open-state=20s

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
