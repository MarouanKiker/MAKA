# =============================================================================
# Nginx - Reverse Proxy / API Gateway
# Avec CORS pour le frontend Angular (dev sur :4200)
# =============================================================================

# --- Upstreams ---
upstream auth_service {
    server auth-service:9000;
}
upstream crm_service {
    server crm-service:5000;
}

# --- Map pour gerer les preflight CORS ---
map $request_method $cors_method {
    OPTIONS 1;
    default 0;
}

server {
    listen 80;
    server_name localhost;

    # --- Headers CORS globaux ---
    set $cors_origin "http://localhost:4200";

    location /api/auth {
        # CORS preflight (OPTIONS)
        if ($cors_method) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        fastcgi_pass auth_service;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_param REQUEST_URI $request_uri;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;

        # CORS headers sur les reponses
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    }

    location /api/crm {
        # CORS preflight (OPTIONS)
        if ($cors_method) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
            add_header Access-Control-Max-Age 3600;
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }

        proxy_pass http://crm_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS headers sur les reponses
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept" always;
    }

    location /health {
        return 200 '{"status": "gateway_ok"}';
        add_header Content-Type application/json;
    }
}