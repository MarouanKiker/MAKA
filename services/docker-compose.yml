# =============================================================================
# Hub & Spoke Microservices - Docker Compose
# All values are read from .env file (with fallback defaults)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # RABBITMQ - Bus de messages asynchrone entre microservices
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    ports:
      - "${PORT_RABBITMQ:-5672}:5672"
      - "${PORT_RABBITMQ_UI:-15672}:15672"
    volumes:
      - ../rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-maka}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-maka_secret}
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbitmq_management load_definitions \"/etc/rabbitmq/definitions.json\""
    networks:
      - hub-network
      - finance-network

  # ---------------------------------------------------------------------------
  # FRONTEND - Angular 17 (dev server sur port 4200)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "${PORT_FRONTEND:-4200}:4200"
    volumes:
      - ../frontend:/app
      - /app/node_modules
    depends_on:
      - gateway
    networks:
      - hub-network

  # ---------------------------------------------------------------------------
  # GATEWAY (Hub) - Point d'entrée unique (port 8000 pour éviter conflit Windows)
  # ---------------------------------------------------------------------------
  gateway:
    image: nginx:alpine
    container_name: gateway
    ports:
      - "${PORT_NGINX:-8000}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
    networks:
      - hub-network

  # ---------------------------------------------------------------------------
  # AUTH SERVICE (Spoke 1) - Symfony 7 + PHP-FPM
  # ---------------------------------------------------------------------------
  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
      network: host
    container_name: auth-service
    volumes:
      - ./auth-service:/var/www/html
      - vendor_data:/var/www/html/vendor
      - jwt-keys:/var/www/html/config/jwt
    environment:
      APP_ENV: ${APP_ENV:-dev}
      APP_SECRET: ${APP_SECRET:-change_me_in_production_please}
      DATABASE_URL: "postgresql://${AUTH_DB_USER:-auth_user}:${AUTH_DB_PASSWORD:-auth_pass}@auth-db:5432/${AUTH_DB_NAME:-auth_db}?serverVersion=16&charset=utf8"
      JWT_PASSPHRASE: ${JWT_PASSPHRASE:-your_jwt_passphrase}
    depends_on:
      - auth-db
    networks:
      - hub-network
      - auth-network

  # ---------------------------------------------------------------------------
  # CRM SERVICE (Spoke 2) - .NET 8 Web API
  # ---------------------------------------------------------------------------
  crm-service:
    build:
      context: ./crm-service
      dockerfile: Dockerfile
      network: host
    container_name: crm-service
    ports:
      - "5000:5000"
    volumes:
      - jwt-keys:/app/keys:ro
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: "http://+:5000"
      ConnectionStrings__DefaultConnection: "Host=crm-db;Port=5432;Database=${CRM_DB_NAME:-crm_db};Username=${CRM_DB_USER:-crm_user};Password=${CRM_DB_PASSWORD:-crm_pass}"
    depends_on:
      - crm-db
    networks:
      - hub-network
      - crm-network

  # ---------------------------------------------------------------------------
  # HR SERVICE (Spoke HR) - Spring Boot 3 + Java 17
  # ---------------------------------------------------------------------------
  hr-service:
    build:
      context: ./hr-service
      dockerfile: Dockerfile
      network: host
    container_name: hr-service
    ports:
      - "8080:8080"
    volumes:
      - jwt-keys:/app/keys:ro
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://hr-db:5432/${HR_DB_NAME:-hr_db}"
      SPRING_DATASOURCE_USERNAME: ${HR_DB_USER:-hr_user}
      SPRING_DATASOURCE_PASSWORD: ${HR_DB_PASSWORD:-hr_pass}
    depends_on:
      - hr-db
      - auth-service
    networks:
      - hub-network
      - hr-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES HR - PostgreSQL 16
  # ---------------------------------------------------------------------------
  hr-db:
    image: postgres:16-alpine
    container_name: hr-db
    environment:
      POSTGRES_DB: ${HR_DB_NAME:-hr_db}
      POSTGRES_USER: ${HR_DB_USER:-hr_user}
      POSTGRES_PASSWORD: ${HR_DB_PASSWORD:-hr_pass}
    volumes:
      - hr-db-data:/var/lib/postgresql/data
    networks:
      - hr-network

  # ---------------------------------------------------------------------------
  # FINANCE SERVICE (Spoke 3) - Spring Boot 3 + Java 17
  # ---------------------------------------------------------------------------
  finance-service:
    build:
      context: ./finance-service
      dockerfile: Dockerfile
      network: host
    container_name: finance-service
    volumes:
      - jwt-keys:/app/keys:ro
    environment:
      SERVER_PORT: 6000
      SPRING_DATASOURCE_URL: "jdbc:postgresql://finance-db:5432/${FINANCE_DB_NAME:-finance_db}"
      DB_URL: "jdbc:postgresql://finance-db:5432/${FINANCE_DB_NAME:-finance_db}"
      DB_USERNAME: ${FINANCE_DB_USER:-finance_user}
      DB_PASSWORD: ${FINANCE_DB_PASSWORD:-finance_pass}
      SPRING_DATASOURCE_USERNAME: ${FINANCE_DB_USER:-finance_user}
      SPRING_DATASOURCE_PASSWORD: ${FINANCE_DB_PASSWORD:-finance_pass}
      SPRING_CACHE_TYPE: simple
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER:-maka}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS:-maka_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AUTH_JWK_SET_URI: http://auth-service:9000/.well-known/jwks.json
    depends_on:
      - finance-db
      - auth-service
      - rabbitmq
      - redis
    networks:
      - hub-network
      - finance-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES AUTH - PostgreSQL 16
  # ---------------------------------------------------------------------------
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME:-auth_db}
      POSTGRES_USER: ${AUTH_DB_USER:-auth_user}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD:-auth_pass}
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    networks:
      - auth-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES CRM - PostgreSQL 16
  # ---------------------------------------------------------------------------
  crm-db:
    image: postgres:16-alpine
    container_name: crm-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${CRM_DB_NAME:-crm_db}
      POSTGRES_USER: ${CRM_DB_USER:-crm_user}
      POSTGRES_PASSWORD: ${CRM_DB_PASSWORD:-crm_pass}
    volumes:
      - crm-db-data:/var/lib/postgresql/data
    networks:
      - crm-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES FINANCE - PostgreSQL 16
  # ---------------------------------------------------------------------------
  finance-db:
    image: postgres:16-alpine
    container_name: finance-db
    environment:
      POSTGRES_DB: ${FINANCE_DB_NAME:-finance_db}
      POSTGRES_USER: ${FINANCE_DB_USER:-finance_user}
      POSTGRES_PASSWORD: ${FINANCE_DB_PASSWORD:-finance_pass}
    volumes:
      - finance-db-data:/var/lib/postgresql/data
    networks:
      - finance-network

  # ---------------------------------------------------------------------------
  # REDIS - Cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    networks:
      - hub-network
      - finance-network

  # ---------------------------------------------------------------------------
  # SALES & AI SERVICE (Spoke 4) - FastAPI Python 3.11
  # ---------------------------------------------------------------------------
  sales-service:
    build:
      context: ./sales-service
      dockerfile: Dockerfile
    container_name: sales-service
    volumes:
      - ./sales-service:/app
      - jwt-keys:/app/keys:ro
    environment:
      DATABASE_URL: "postgresql://${SALES_DB_USER:-sales_user}:${SALES_DB_PASSWORD:-sales_pass}@sales-db:5432/${SALES_DB_NAME:-sales_db}"
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      GATEWAY_URL: http://gateway:80
      RABBITMQ_URL: "amqp://${RABBITMQ_USER:-maka}:${RABBITMQ_PASS:-maka_secret}@rabbitmq:5672/"
    depends_on:
      - sales-db
      - rabbitmq
    networks:
      - hub-network
      - sales-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES SALES - PostgreSQL 16
  # ---------------------------------------------------------------------------
  sales-db:
    image: postgres:16-alpine
    container_name: sales-db
    environment:
      POSTGRES_DB: ${SALES_DB_NAME:-sales_db}
      POSTGRES_USER: ${SALES_DB_USER:-sales_user}
      POSTGRES_PASSWORD: ${SALES_DB_PASSWORD:-sales_pass}
    volumes:
      - sales-db-data:/var/lib/postgresql/data
    networks:
      - sales-network

  # ---------------------------------------------------------------------------
  # STOCK SERVICE (Spoke 5) - Spring Boot 3 + Java 17 + JDBC
  # ---------------------------------------------------------------------------
  stock-service:
    build:
      context: ./stock-service
      dockerfile: Dockerfile
      network: host
    container_name: stock-service
    ports:
      - "8083:8083"
    volumes:
      - jwt-keys:/app/keys:ro
    environment:
      STOCK_DB_HOST: stock-db
      STOCK_DB_PORT: 5432
      STOCK_DB_NAME: ${STOCK_DB_NAME:-stock_db}
      STOCK_DB_USER: ${STOCK_DB_USER:-stock_user}
      STOCK_DB_PASSWORD: ${STOCK_DB_PASSWORD:-stock_pass}
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
    depends_on:
      - stock-db
      - auth-service
    networks:
      - hub-network
      - stock-network

  # ---------------------------------------------------------------------------
  # BASE DE DONNÉES STOCK - PostgreSQL 16
  # ---------------------------------------------------------------------------
  stock-db:
    image: postgres:16-alpine
    container_name: stock-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: ${STOCK_DB_NAME:-stock_db}
      POSTGRES_USER: ${STOCK_DB_USER:-stock_user}
      POSTGRES_PASSWORD: ${STOCK_DB_PASSWORD:-stock_pass}
    volumes:
      - stock-db-data:/var/lib/postgresql/data
    networks:
      - stock-network

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  jwt-keys:
  auth-db-data:
  crm-db-data:
  hr-db-data:
  finance-db-data:
  sales-db-data:
  stock-db-data:
  vendor_data:

# =============================================================================
# RÉSEAUX
# =============================================================================
networks:
  hub-network:
    driver: bridge
  auth-network:
    driver: bridge
  crm-network:
    driver: bridge
  hr-network:
    driver: bridge
  finance-network:
    driver: bridge
  sales-network:
    driver: bridge
  stock-network:
    driver: bridge
